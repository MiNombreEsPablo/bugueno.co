<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/w3.css">
    <link rel="stylesheet" href="css/w3-theme.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Links MiNombreEsPablo</title>
    <script src="https://kit.fontawesome.com/a2bab65f30.js" crossorigin="anonymous"></script>
    <style>
        .container {
            width: 100%;
            height: 100%;
            padding-right: 15px;
            padding-left: 15px;
            margin-right: auto;
            margin-left: auto;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .links-container a {
            width: 80%;
        }

        .link {
            padding: 14px 20px;
        }

        .lang-toggle {
            display: block;
            margin-left: auto;
            padding: 4px 12px;
            font-size: 12px;
        }

        .w3-theme-l1:hover {
            background-color: #673ab7 !important;
        }

        .margin-top-2 {
            margin-top: 32px;
        }

        .bottom {
            width: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: bolder;
        }

        .bottom span {
            color: #673ab7;
        }

        .bottom i {
            color: #673ab7;
        }

        @media (min-width: 768px) {
            .link {
                width: 100%;
            }
        }

        @media (min-width: 576px) {
            .container {
                max-width: 540px;
            }
        }
    </style>
</head>

<body style="background-color: #0e0e10;">
    <!-- Content container -->

    <div class="container">

        <button id="lang-toggle" type="button"
            class="lang-toggle w3-button w3-round w3-theme-l1 w3-border">EN</button>

        <!-- Image and name container. Change to your pictue here. -->
        <div style="text-align: center">
            <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/a7a72740-dc9b-469b-83eb-9462e6ac01fa-profile_image-300x300.png"
                class="w3-margin" alt="image" width="150px" height="150px" style="border-radius: 50%;">
            <p><span class="name w3-padding w3-deep-purple w3-round" style="font-weight: bolder;"
                    data-i18n="greeting">Hola, mi nombre es Pablo</span></p>
            <p style="font-weight: bolder; color: white" data-i18n="tagline">y esta es mi página</p>
        </div>
        <!-- Links section 1. Replace the # inside of the "" with your links. -->
        <!--<h4 class="margin-top-2" style="text-align: center;">MY SOCIAL NETWORKS</h4> -->
        <div class="links-container">
            <a href="https://www.youtube.com/channel/UCgjoTmul0bm3FWMLywGyc_Q"
                class="w3-button w3-round-xlarge w3-theme-l1 w3-border link" target="_blank">
                <i class="fa-brands fa-youtube"></i> YouTube
            </a>
            <br>
            <a href="https://www.instagram.com/minombreespablo/"
                class="w3-button w3-round-xlarge w3-theme-l1 w3-border link" target="_blank">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <br>
            <a href="https://streamlabs.com/minombreespablo1/tip"
                class="w3-button w3-round-xlarge w3-theme-l1 w3-border link" target="_blank"><i
                    class="fa-solid fa-hand-holding-dollar"></i> <span data-i18n="donaciones">Donaciones</span></a>
            <br>
            <a href="https://www.twitch.tv/minombreespablo" class="w3-button w3-round-xlarge w3-theme-l1 w3-border link"
                target="_blank"><i class="fa-brands fa-twitch"></i> Twitch</a>
            <br>
            <a href="https://twitter.com/MiNombreEsPablo" class="w3-button w3-round-xlarge w3-theme-l1 w3-border link"
                target="_blank"><i class="fa-brands fa-twitter"></i> Twitter</a>

        </div>

        <!-- Bottom section 3 -->
        <div class="bottom margin-top-2 w3-padding w3-round">
            <span>2026 - Pablo Bugueño</span>
            <i class="fa-solid fa-heart"></i>
        </div>

    </div>
    <script>
        const translations = {
            es: {
                greeting: 'Hola, mi nombre es Pablo',
                tagline: 'y esta es mi página',
                donaciones: 'Donaciones',
            },
            en: {
                greeting: 'Hi, my name is Pablo',
                tagline: 'and this is my page',
                donaciones: 'Donations',
            },
        };

        function applyLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach((el) => {
                el.textContent = translations[lang][el.dataset.i18n];
            });
            document.documentElement.lang = lang;
            document.getElementById('lang-toggle').textContent = lang === 'es' ? 'EN' : 'ES';
            localStorage.setItem('lang', lang);
        }

        const langToggle = document.getElementById('lang-toggle');
        langToggle.addEventListener('click', () => {
            applyLanguage(document.documentElement.lang === 'es' ? 'en' : 'es');
        });

        function detectLanguage() {
            const saved = localStorage.getItem('lang');
            if (saved) return saved;
            const browserLang = navigator.language || 'es';
            return browserLang.toLowerCase().startsWith('es') ? 'es' : 'en';
        }

        applyLanguage(detectLanguage());
    </script>
</body>

</html>
