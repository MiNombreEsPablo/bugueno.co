<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <link rel="stylesheet" href="css/w3.css">
    <link rel="stylesheet" href="css/w3-theme.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Links MiNombreEsPablo</title>
    <script src="https://kit.fontawesome.com/a2bab65f30.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #0e0e10;
            --text: #ffffff;
            color-scheme: dark;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f6f3fb;
                --text: #17151c;
                color-scheme: light;
            }
        }

        html[data-theme="dark"] {
            --bg: #0e0e10;
            --text: #ffffff;
            color-scheme: dark;
        }

        html[data-theme="light"] {
            --bg: #f6f3fb;
            --text: #17151c;
            color-scheme: light;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .container {
            width: 100%;
            height: 100%;
            padding: 24px 15px;
            margin-right: auto;
            margin-left: auto;
            margin-top: auto;
            margin-bottom: auto;
        }

        .profile {
            text-align: center;
            margin-bottom: 32px;
        }

        .avatar {
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(103, 58, 183, 0.3);
        }

        .tagline {
            font-weight: bolder;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 22.5px;
        }

        .links-container a {
            width: 80%;
        }

        .link {
            padding: 14px 20px;
        }

        .lang-toggle,
        .theme-toggle {
            padding: 4px 12px;
            font-size: 12px;
        }

        .w3-theme-l1 {
            background-color: #673ab7 !important;
            transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        }

        .w3-theme-l1:hover {
            background-color: #7d4fc4 !important;
            box-shadow: 0 6px 16px rgba(103, 58, 183, 0.35);
            transform: translateY(-1px);
        }

        .w3-theme-l1:active {
            background-color: #562f96 !important;
            transform: translateY(0);
            box-shadow: none;
        }

        .margin-top-2 {
            margin-top: 32px;
        }

        .bottom {
            width: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: bolder;
        }

        .bottom span {
            color: #673ab7;
        }

        .bottom i {
            color: #673ab7;
        }

        @media (min-width: 576px) {
            .container {
                max-width: 540px;
            }
        }
    </style>
</head>

<body>
    <!-- Content container -->

    <div class="container">

        <div class="top-bar">
            <button id="theme-toggle" type="button" aria-label="Toggle light/dark theme"
                class="theme-toggle w3-button w3-round w3-theme-l1 w3-border"><i class="fa-solid fa-moon"></i></button>
            <button id="lang-toggle" type="button"
                class="lang-toggle w3-button w3-round w3-theme-l1 w3-border">EN</button>
        </div>

        <!-- Image and name container. Change to your pictue here. -->
        <div class="profile">
            <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/a7a72740-dc9b-469b-83eb-9462e6ac01fa-profile_image-300x300.png"
                class="w3-margin avatar" alt="image" width="150px" height="150px">
            <p><span class="name w3-padding w3-deep-purple w3-round" style="font-weight: bolder;"
                    data-i18n="greeting">Hola, mi nombre es Pablo</span></p>
            <p class="tagline" data-i18n="tagline">y esta es mi página</p>
        </div>
        <!-- Links section 1. Replace the # inside of the "" with your links. -->
        <!--<h4 class="margin-top-2" style="text-align: center;">MY SOCIAL NETWORKS</h4> -->
        <div class="links-container">
            <a href="https://www.youtube.com/channel/UCgjoTmul0bm3FWMLywGyc_Q"
                class="w3-button w3-round-xlarge w3-theme-l1 w3-border link" target="_blank">
                <i class="fa-brands fa-youtube"></i> YouTube
            </a>
            <a href="https://www.instagram.com/minombreespablo/"
                class="w3-button w3-round-xlarge w3-theme-l1 w3-border link" target="_blank">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <a href="https://ko-fi.com/minombreespablo"
                class="w3-button w3-round-xlarge w3-theme-l1 w3-border link" target="_blank"><i
                    class="fa-solid fa-hand-holding-dollar"></i> <span data-i18n="donaciones">Donaciones</span></a>
            <a href="https://www.twitch.tv/minombreespablo" class="w3-button w3-round-xlarge w3-theme-l1 w3-border link"
                target="_blank"><i class="fa-brands fa-twitch"></i> Twitch</a>
            <a href="https://x.com/MiNombreEsPablo" class="w3-button w3-round-xlarge w3-theme-l1 w3-border link"
                target="_blank"><i class="fa-brands fa-x-twitter"></i> X</a>

        </div>

        <!-- Bottom section 3 -->
        <div class="bottom margin-top-2 w3-padding w3-round">
            <span>2026 - Pablo Bugueño</span>
            <i class="fa-solid fa-heart"></i>
        </div>

    </div>
    <script>
        const translations = {
            es: {
                greeting: 'Hola, mi nombre es Pablo',
                tagline: 'y esta es mi página',
                donaciones: 'Donaciones',
            },
            en: {
                greeting: 'Hi, my name is Pablo',
                tagline: 'and this is my page',
                donaciones: 'Donations',
            },
        };

        function applyLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach((el) => {
                el.textContent = translations[lang][el.dataset.i18n];
            });
            document.documentElement.lang = lang;
            document.getElementById('lang-toggle').textContent = lang === 'es' ? 'EN' : 'ES';
            localStorage.setItem('lang', lang);
        }

        const langToggle = document.getElementById('lang-toggle');
        langToggle.addEventListener('click', () => {
            applyLanguage(document.documentElement.lang === 'es' ? 'en' : 'es');
        });

        function detectLanguage() {
            const saved = localStorage.getItem('lang');
            if (saved) return saved;
            const browserLang = navigator.language || 'es';
            return browserLang.toLowerCase().startsWith('es') ? 'es' : 'en';
        }

        applyLanguage(detectLanguage());

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-toggle').innerHTML =
                theme === 'dark' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
            localStorage.setItem('theme', theme);
        }

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });

        function detectTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) return saved;
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        applyTheme(detectTheme());
    </script>
</body>

</html>
